                - 5
                example: 1
                description: Consignee tax ID type. See [Tax ID Types]( https://developer.dhl.com/api-reference/references#get-started-section/tax-id-types
                  ) for valid values. Mandatory for some international destinations.
                  See the [International Regulations]( https://developer.dhl.com/api-reference/references#get-started-section/international-regulations
