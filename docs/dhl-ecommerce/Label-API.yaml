                minLength: 0
                maxLength: 100000
                example: iVBORw0KGgoAAAANSUhEUgAAAywAAATCAQAAAAB3HF9MAAAV...
              encodeType:
                type: string
                example: BASE64
                description: Either base64 or plain text depending on the
                  label format requested.
                enum:
                - BASE64
                - PLAIN
              format:
                type: string
                description: Formats supported are ZPL, PNG, or PDF. One
                  of these formats depending on the label format requested.
                  (M)
                enum:
                - ZPL
                - PNG
                - PDF
                example: ZPL
              link:
                type: string
                minLength: 1
                maxLength: 150
                description: Link to the label. (M)
                example: https://api-sandbox.dhlecs.com/shipping/v4/label/pickup-identifier-example?packageId=V4-TEST-1586965592482
              labelDetail:
                type: object
                properties:
                  serviceEndorsement:
                    type: string
                    description: >
                      Ancillary service endorsements are used to request a new address and to provide the USPS with instructions on how to handle undeliverable-as-addressed pieces.
                      The endorsements are the same for all classes of mail, but the treatment and cost differ by class of mail.
                      Use of an ancillary service endorsement on a mailpiece obligates the mailer to pay any applicable charges for forwarding, return, and separate address notification charges.(O)
                    example: "1"
                    minLength: 1
                    maxLength: 30
                  intendedReceivingFacility:
                      type: string
                      example: USRDU1
                      minLength: 1
                      maxLength: 30
                      description: Identifies the final DHL eCommerce facility from which the shipment will be injected into the USPS mail stream.(O)
                  customsDetailsProvided:
                      type: boolean
                      example: true
                      enum:
                      - true
                      - false
                      description: true if at least one customs details (commodity level) data was provided in the request. Not required for US Domestic products.(M)
        orderedProductId:
          type: string
          maxLength: 10
          minLength: 1
          pattern: ^[A-Z]{3}$
          description: DHL eCommerce three-character product code that was
            requested. Please refer to our documentation site for a full
            list of product codes. (M)
          example: PLT
security:
- OAuth2: []
