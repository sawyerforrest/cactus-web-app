openapi: 3.0.0
info:
  title: DHL Label API
  version: 4.0.0
  description: |
    DHL Label API enables clients to create shipping labels for domestic and international shipments, allowing for easy integration into shipping workflows.

    Please note, account specific information such as Pickup Account Number and Distribution Center will be provided to you via a DHL eCommerce Onboarding Form.

    Minimum information needed to generate a label:
      - Your pickup account number
      - Distribution Center
      - Ordered Product ID
      - Consignee Address
      - Return Address
      - Unique Package Id
      - Weight and Weight UOM of the package

    Note: Rates are available from API when explicitly requested in `orderedProductId` for BPM products.

    `APO/FPO/DPO shipments`

    APO, FPO, DPO and non‑continental U.S. locations are serviceable by DHL eCommerce.
    Although these shipments are classified as Domestic, they require the `customsDetails` array—similar to International shipments (max 5 elements).

    For APO/FPO/DPO shipments:
      - country must be "US"
      - state must be "AA", "AE", or "AP"
      - city must be "APO", "FPO", or "DPO"

    Additional rules:
      - Dangerous Goods not supported
      - Shipment value ≤ $400 USD

    The orderedProductId field supports:
      - Ground Advantage: GND
      - Bounded Printed Matter: BGN, BEX
      - Parcel Select: MAX, EXP

    Resulting label includes a shipping label with an integrated customs form.

     `M- Mandatory  O- Optional  C- Conditional  N- Not Applicable`
servers:
- url: https://api-bat.dhlecs.com
  description: Sandbox Environment
paths:
  /shipping/v4/label:
    post:
      tags:
      - Label
      operationId: createLabel
      summary: Create a shipping label (Domestic or International)
      description: "Use this request to create a single label for any US Domestic\
        \ or International Product.\nHere's the minimum information you need to generate\
        \ a label:\n- Your pickup Account number\n- Distribution Center\n- Ordered\
        \ Product ID\n- Consignee Address\n- Return Address\n- Unique Package Id\n\
        - Weight and Weight UOM of Package\n- Request Description\n\n  Remove shipperAddress,pickupAddress\
        \ and customsDetails from the Request body while generating a Domestic Label.\n\
        \  \n  AUTHORIZATION Bearer Token\n- This request is using Bearer Token from\
        \ collection DHL eCommerce Americas API\n\n- HEADERS\n  - Content-Type: application/json\n\
        - PARAMS\n  - format: ZPL or PNG or PDF\n"
      parameters:
      - name: format
        in: query
        required: true
        description: The format of the label. Acceptable values are ZPL, PNG, and
          PDF.
        schema:
          type: string
          enum:
          - ZPL
          - PNG
          - PDF
      - name: User-Agent
        in: header
        description: Information about the client application making the request.
        schema:
          type: string
          default: eCOMv4 DHLeC Developer portal
