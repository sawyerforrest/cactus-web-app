              address1:
                type: string
                maxLength: 50
                minLength: 1
                pattern: ^$|.*[^\s].*
                description: Address line 1 of return address. (M for Domestic and International)
                example: 4552 Old Dixie Hwy
              address2:
                type: string
                maxLength: 50
                minLength: 0
                description: Address line 2 of return address. (O for Domestic and International)
                example: Near Pixar Road
              address3:
                type: string
                maxLength: 50
                minLength: 0
                description: Address line 3 of return address. (N for Domestic and C
                  for International)
                example: Near Pixar Road
              city:
                type: string
                maxLength: 40
                minLength: 1
                pattern: ^$|.*[^\s].*
                description: City of return address. (M for Domestic and International)
                example: Baltimore
              state:
                type: string
                maxLength: 50
                minLength: 0
                description: State of return address. (C for Domestic and O for International)
                example: MD
              country:
                type: string
                maxLength: 2
                minLength: 2
                pattern: ^[A-Z]{2}$
                description: Two-character ISO return address country code. (M for Domestic and International)
                example: US
              postalCode:
                type: string
                maxLength: 10
                minLength: 3
                description: Postal code of return address. (M for Domestic and C for
                  International)
                example: 30024
              email:
                type: string
                maxLength: 50
                minLength: 0
                description: Email of return address. Mandatory for some international
                  destinations. See the [International Regulations]( https://developer.dhl.com/api-reference/references#get-started-section/international-regulations
                  ) section for more information. (O for Domestic and International)
                example: joebloggs@joebloggs.com
              phone:
                type: string
                maxLength: 26
                minLength: 0
                description: Phone of return address. Mandatory for some international
                  destinations. See the [International Regulations]( https://developer.dhl.com/api-reference/references#get-started-section/international-regulations
                  ) section for more information. (O for Domestic and  International)
                example: 123-123-6789
        pickupAddress:
            type: object
            description: Address where the package is picked up from. If not provided,the address associated with the pickup account will be used. ( O for International)
            properties:
              name:
                type: string
                maxLength: 30
                minLength: 0
                pattern: ^$|.*[^\s].*
                description: Name of pickup contact. (C for International)
                example: John K
              companyName:
                type: string
                maxLength: 30
                minLength: 0
                pattern: ^$|.*[^\s].*
                description: Company name of pickup contact. (C
                  for International)
                example: Acme Shoe Co.
              address1:
                type: string
                maxLength: 50
                minLength: 1
                pattern: ^$|.*[^\s].*
                description: Address line 1 of pickup address. (M for International)
                example: 123 Findings Drive
              address2:
                type: string
                maxLength: 50
                minLength: 0
                description: Address line 2 of pickup address. (O for International)
                example: Suite 100
              address3:
                type: string
                maxLength: 50
                minLength: 0
                description: Address line 3 of pickup address.(C for International)
                example: Near Diagon Alley
              city:
                type: string
                maxLength: 40
                minLength: 1
                pattern: ^$|.*[^\s].*
                description: City of pickup address. (M for International)
                example: Norcross
              state:
                type: string
                maxLength: 50
                minLength: 0
                description: State of pickup address. (O for International)
                example: GA
              country:
                type: string
                maxLength: 2
                minLength: 2
                pattern: ^[A-Z]{2}$
                description: Two-character ISO pickup address country code. (M for International)
                example: US
              postalCode:
                type: string
                maxLength: 10
                minLength: 3
                description: Postal code of the pickup address. (C for International)
                example: '30092'
              email:
                type: string
                maxLength: 50
                minLength: 0
                description: "Email of pickup contact. Mandatory for some international destinations. See the [International Regulations]( https://developer.dhl.com/api-reference/references#get-started-section/international-regulations) section for more information. (C for International )"
                example: johnk@johnk.com
              phone:
                type: string
                maxLength: 26
                minLength: 0
                description: "Phone of pickup contact. Mandatory for some international destinations. See the [International Regulations]( https://developer.dhl.com/api-reference/references#get-started-section/international-regulations) section for more information. (C for International )"
                example: 123-123-0000
        shipperAddress:
              type: object
              description: Seller's address and other related information. If not provided, the account's pickup address will be used. If fulfilling for a merchant, this should reflect the merchant's information. (O for International)
              properties:
                name:
                  type: string
                  maxLength: 30
                  minLength: 0
                  pattern: '^$|.*[^\s].*'
                  description: Name of seller contact.(M for International)
                  example: John 
                companyName:
                  type: string
                  maxLength: 30
                  minLength: 0
                  pattern: '^$|.*[^\s].*'
                  description: Company name of seller contact.(C for International)
                  example: DHL Inc.
                address1:
                  type: string
                  maxLength: 50
                  minLength: 1
                  pattern: '^$|.*[^\s].*'
                  description: Address line 1 of seller address.(M for International)
                  example: Findings Drive
                address2:
                  type: string
                  maxLength: 50
                  minLength: 0
                  description: Address line 2 of seller address.(O for International)
                  example: Near Diagon Alley
                address3:
                  type: string
                  maxLength: 50
                  minLength: 0
                  description: Address line 3 of seller address.(C for International)
                  example: Near Diagon Alley
                city:
                  type: string
                  maxLength: 40
                  minLength: 1
                  pattern: '^$|.*[^\s].*'
                  description: City of seller address.(M for International)
                  example: Norcross
                state:
                  type: string
                  maxLength: 50
                  minLength: 0
                  description: State of seller address.(O for International)
                  example: GA
                country:
                  type: string
                  maxLength: 2
                  minLength: 2
                  pattern: '^[A-Z]{2}$'
                  description: Two-character ISO seller address country code.(M for International)
                  example: US
                postalCode:
                  type: string
                  maxLength: 10
                  minLength: 3
                  description: Postal code of the seller address.(C for International)
                  example: 30092
                email:
                  type: string
                  maxLength: 50
                  minLength: 0
                  description: "Email of seller contact. Mandatory for some international destinations. See the [International Regulations]( https://developer.dhl.com/api-reference/references#get-started-section/international-regulations ) section for more information. (C for International)"
                  example: johnk@johnk.com
                phone:
                  type: string
                  maxLength: 26
                  minLength: 0
                  description: "Phone of seller contact. Mandatory for some international destinations. See the [International Regulations]( https://developer.dhl.com/api-reference/references#get-started-section/international-regulations ) section for more information. (C for International)"
                  example: 123-123-0000
                taxId: 
                  type: string
                  maxLength: 50
                  minLength: 0
                  description: Seller tax ID. Required if taxIdType is '3'. Mandatory for some international destinations. See the [International Regulations]( https://developer.dhl.com/api-reference/references#get-started-section/international-regulations ) section for more information.(C for International)
                  example: 90000230082958122
                taxIdType:
                  type: number
                  description: Seller tax ID type. See the [Tax ID Types] https://developer.dhl.com/api-reference/references-dhl-ecommerce-americas#get-started-section/tax-id-types section for valid values. Mandatory for some international destinations. See the [International Regulations]( https://developer.dhl.com/api-reference/references#get-started-section/international-regulations ) section for more information. (C for International)
                  enum:
                    - 0
                    - 1
                    - 2
                    - 3
                    - 4
                    - 5
                  example: 1
        packageDetail:
          type: object
          description: Object that contains the package detail.(M for Domestic and
            International)
          required:
          - packageId
          - packageDescription
          - weight
          properties:
            packageId:
              type: string
              maxLength: 30
              minLength: 1
              pattern: ^[a-zA-Z0-9]([a-zA-Z0-9_.\-]*[a-zA-Z0-9])?$
              description: Customer-provided package ID, also known as the CCN (customer
                confirmation number) or the GM number. Not case sensitive. Can contain
                the following special characters except in the beginning or the end
                of the string "-", ".","_". We recommend a minimum length of 8 characters.(M
                for Domestic and International)
              example: GM60511234500000001
            packageDescription:
              type: string
              maxLength: 50
              minLength: 1
              description: Description of the contents of the package. (M for Domestic
                and International)
              example: Toys for kids
            packageReference:
              type: string
              maxLength: 20
              minLength: 0
              description: A prefix that will be prepended to the human-readable Package
                ID and display at the bottom of the label along with a barcode of
                the package ID. (O for Domestic and International)
              example: test
            orderSource:
              type: string
              description: Web shop, web platform, or merchant site from which the
                order originated. (O for Domestic and International)
              minLength: 0
              maxLength: 80
              example: www.shopify.com
            customsCertificate:
              type: string
              description: Customs Certificate. (N for Domestic and O for International)
              minLength: 0
              maxLength: 50
              example: ID0032675NA4
            customsLicense:
              type: string
              description: Customs License. (N for Domestic and O for International)
              minLength: 0
              maxLength: 50
              example: 985X00001357
            contentCategory:
              type: string
              description: "Identified the DHL eCommerce dangerous goods category\
                \ code. DHL eCommerce accepts two types of Dangerous Goods, Lithium\
                \ batteries and Limited Quantity material (other regulated materials\
                \ for domestic transport only). While some sub-categories of Lithium\
                \ batteries can be transported via DHL eCommerce\u2019s expedited\
                \ air network, Limited Quantity materials are only allowed for ground\
                \ transportation.   Refer to valid values under References.(O for\
                \ Domestic and International)"
              example: '03'
              minLength: 2
              maxLength: 2
            billingReference1:
              type: string
              example: DSJDHFIK863
              maxLength: 30
              minLength: 0
              description: String of characters that can be used to aggregate billing
                data (can be unique per parcel). billingReference1 is also referred
                to as Reference. (O for Domestic and International)
            billingReference2:
              type: string
              example: DSJDHFIK863
              maxLength: 30
              minLength: 0
              description: Secondary string of characters that can be used to aggregate
                billing data (can be unique per parcel). billingReference2 is also
                referred to as Batch(O for Domestic and N for International)
            customLabelText1:
              type: string
              maxLength: 50
              minLength: 0
              description: String of characters that can be used to show additional
                text on the label to assist with pick/pack processes. Values entered
                will NOT be captured on the invoices. Some examples include order
                numbers, miscellaneous notes, and department information.(O for Domestic
                and International)
              example: Order number 123456789
            customLabelText2:
              type: string
              maxLength: 50
              minLength: 0
              description: Secondary string of characters that can be used to show
                additional text on the label to assist with pick/pack processes. Values
                entered will NOT be captured on the invoices. Some examples include
                order numbers, miscellaneous notes, and department information.  (O
                for Domestic and International)
              example: Project ABC
            weight:
              type: object
              required:
              - value
              - unitOfMeasure
              description: Object that contains the package weight details. Mainly
                used for validating and identifying the right shipping product. See
                Weights for defined values. Please conform to product limitations.
                (M for Domestic and International)
              properties:
                value:
                  type: number
                  maximum: 999999.99
                  minimum: 0
                  description: Total package weight. (M for Domestic and International)
                  format: float
                  example: 28.8
                unitOfMeasure:
                  type: string
                  description: Unit of measure for the weight. (M for Domestic and
                    International)
                  example: OZ
                  enum:
                  - LB
                  - OZ
                  - KG
                  - G
            dimension:
              type: object
              description: Object that contains the package dimension details. This
                will be used to calculate the dimensional weight. See [Weights]( https://developer.dhl.com/api-reference/references#get-started-section/weight-units
                ) for defined values.  Please conform to product limitations. (O for
                Domestic and International)
              required:
              - length
              - width
              - height
              - unitofMeasure
              properties:
                length:
                  type: number
                  format: float
                  description: Length of the package. Please conform to product limitations.
                    (M for Domestic and International)
                  minimum: 0
                  maximum: 9999.99
                  example: 8.25
                width:
                  type: number
                  format: float
                  description: Width of the package. Please conform to product limitations.
                    (M for Domestic and International)
                  minimum: 0
                  maximum: 9999.99
                  example: 8.25
                height:
                  type: number
                  format: float
                  description: Height of the package. Please conform to product limitations.
                    (M for Domestic and International)
                  minimum: 0
                  maximum: 9999.99
                  example: 8.25
                unitOfMeasure:
                  type: string
                  description: Unit of measure for dimensions. (M for Domestic and
                    International)
                  enum:
                  - IN
                  - CM
                  example: IN
                packageType:
                  type: string
                  description: Type of package (used for determining dimensional weight).
                    If packageType is anything other than '1' then a discount factor
                    will be applied. See [Package Types]( https://developer.dhl.com/api-reference/references#get-started-section/package-types
                    ) for valid values. (O for Domestic and International )
                  enum:
                  - '1'
                  - '2'
                  - '3'
                  example: '1'
        shippingCost:
          type: object
          description: Object that contains the package shipping cost details.(O for
            Domestic and M for International)
          required:
          - currency
          properties:
            currency:
              type: string
              maxLength: 3
              minLength: 3
              description: Three-character ISO Currency code. (M for Domestic and
                International)
              example: USD
            freight:
              type: number
              format: float
              maximum: 99999999.99
              minimum: 0
              description: Freight charges for the package in the currency specified.
                (O for Domestic and International)
              example: 9.0
            declaredValue:
              type: number
              format: float
              maximum: 99999999.99
              minimum: 0
              description: Total declared value for the package in the currency specified.
                While not mandatory, best practice is to provide if available. Many
                International destinations have a limit of 2500 USD. (O for Domestic
                and International)
              example: 76.0
            insuredValue:
              type: number
              format: float
              maximum: 99999999.99
              minimum: 0
              description: Total insured value of the package in the currency specified.
                (O for Domestic and International)
              example: 89.0
            duty:
              type: number
              format: float
              minimum: 0
              maximum: 99999999.99
              example: 6.0
              description: Duty charges for the package in the currency specified.
                (O for Domestic and International)
            dutiesPaid:
              type: boolean
              enum:
              - true
              - false
              description: "Whether or not duties were pre-paid by the consignee;\
                \ false for DDU shipments, true for DDP shipments. If the user doesn\u2019\
                t specify then its marked DDU by default. Some international products\
                \ and destinations do not offer both DDP and DDU. See the [International\
                \ Regulations](https://developer.dhl.com/api-reference/references#get-started-section/international-regulations)\
                \ section for more information.(N for Domestic and O for International)"
              example: 'false'
            taxesPaid:
              type: boolean
              enum:
              - true
              - false
              description: Whether or not duties were pre-paid by the shipper. (N
                for Domestic and O for International)
              example: 'false'
            tax:
              type: number
              format: float
              description: Tax charges for the package in the currency specified.
                (O for Domestic and International)
              example: 10.0
              minimum: 0
              maximum: 99999999.99
        customsDetails:
            type: array
            description: Object that contains the customsDetails for the package. Mandatory for International, APO/FPO/DPO and non-continental shipments. (M)
            items:
              type: object
              required:
              - itemDescription
              - countryOfOrigin
              - packagedQuantity
              - skuNumber
              - itemValue
              - currency
              properties:
                itemDescription:
                  type: string
                  example: "Board game - toys"
                  description: Detailed description of the commodity item - Used for customs clearance. Accuracy and Detail are required. (M for International)
                  minLength: 3
                  maxLength: 50
                countryOfOrigin:
                  type: string
                  maxLength: 2
                  minLength: 2
                  pattern: '^[A-Z]{2}$'
                  description: Two-Character Country Code for Origin Manufacturer Country of the product. (M for International)
                  example: CN
                hsCode:
                  type: string
                  maxLength: 20
                  minLength: 6
                  description: The Harmonized Tariff Schedule is a number assigned to every possible commodity that can be imported or exported from any country. Please do not include any decimals "." in this field. Mandatory for some international destinations. See the [International Regulations]( https://developer.dhl.com/api-reference/references#get-started-section/international-regulations ) section for more information. (C for International)
                  example: '644556'
                packagedQuantity:
                  type: integer
                  maximum: 999999
                  minimum: 1
                  description: Quantity of the same item in the package. (M for International)
                  format: int32
                  example: 2
                skuNumber:
                  type: string
                  maxLength: 20
                  minLength: 1
                  description: SKU or item code - Used for product verification on clients website during customs clearance process. (M for International)
                  example: "123"
                itemValue:
                  type: number
                  format: float
                  maximum: 99999999.99
                  minimum: 0.01
                  description: Commercial value of the commodity (per each) in the currency specified. (M for International)
                  example: 34
                currency:
                  type: string
                  example: "USD"
                  minLength: 3
                  maxLength: 3
                  description: Three-character ISO Currency code for this iteration of commodity. (M for International)
                productUrl:
                  type: string
                  maxLength: 255
                  minLength: 0  
                  example: 'https://widgets.io/cat/1234'
                  description: Product URL, may be used for product verification during customs clearance process. (O for International)
    DomesticResponse:
      type: object
      properties:
        timestamp:
              type: string
              description: Date and time of the label request; ISO-8601 date/time
                format.(M)
              format: date-time
              example: '2020-02-10T21:53:16.735Z'
              minLength: 1
              maxLength: 50
        pickup:
          type: string
          maxLength: 10
          minLength: 1
